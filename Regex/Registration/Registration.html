<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <script src="Registration.js" defer></script>
</head>
<body>
    <h2>Registration</h2>
    <form id="registerForm">
        <input type="text" id="firstName" placeholder="First Name..." required><br><br>
        <input type="text" id="lastName" placeholder="Last Name..." required><br><br>
        <input type="date" id="birthDate" required><br><br>
        <input type="email" id="email" placeholder="Email..." required><br><br>
        <input type="email" id="emailConfirmation" placeholder="Email Confirm..." required><br><br>
        <input type="password" id="password" placeholder="Password..." required><br><br>
        <input type="password" id="passwordConfirmation" placeholder="Password Conform..." required><br><br>
        <input type="text" id="mobile" placeholder="07XXXXXXXX" required><br><br>
        <button type="submit">Register</button>
    </form>
</body>
</html>
